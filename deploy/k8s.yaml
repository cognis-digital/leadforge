apiVersion: apps/v1
kind: Deployment
metadata: { name: leadforge, labels: { app: leadforge } }
spec:
  replicas: 1
  selector: { matchLabels: { app: leadforge } }
  template:
    metadata: { labels: { app: leadforge } }
    spec:
      containers:
        - name: leadforge
          image: ghcr.io/cognis-digital/leadforge:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: leadforge }
spec:
  selector: { app: leadforge }
  ports: [{ port: 80, targetPort: 8000 }]
